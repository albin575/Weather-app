<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മഴമേഘം - Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans Malayalam', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .weather-app {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 1s ease;
            position: relative;
        }

        .weather-app.sunny {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }

        .weather-app.cloudy {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .weather-app.rainy {
            background: linear-gradient(135deg, #37474f 0%, #263238 100%);
        }

        .weather-app.snowy {
            background: linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%);
        }

        .weather-app.stormy {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loader {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }

        .cloud {
            position: absolute;
            width: 80px;
            height: 40px;
            background: white;
            border-radius: 50px;
            top: 30px;
            left: 10px;
            animation: float 2s ease-in-out infinite;
        }

        .cloud::before {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            top: -25px;
            left: 10px;
        }

        .cloud::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            top: -20px;
            left: 35px;
        }

        .sun {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffd700;
            border-radius: 50%;
            top: 10px;
            right: 10px;
            animation: rotate 4s linear infinite;
            box-shadow: 0 0 20px #ffd700;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-screen p {
            font-size: 1.2rem;
            opacity: 0.9;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo i {
            font-size: 2rem;
            color: #ffd700;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1rem;
            border: 1px solid var(--glass-border);
            outline: none;
            transition: var(--transition);
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .search-box button {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-box button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        .current-weather {
            margin-bottom: 30px;
        }

        .weather-card {
            padding: 35px;
            text-align: center;
        }

        .location-info h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .location-info p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .weather-main {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .temp-section {
            text-align: left;
        }

        .temperature {
            font-size: 5rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 5px;
        }

        .feels-like {
            font-size: 1rem;
            opacity: 0.8;
        }

        .weather-icon-section {
            text-align: center;
        }

        .weather-icon-section i {
            font-size: 5rem;
            margin-bottom: 10px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        .condition {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: var(--transition);
        }

        .detail-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .detail-item i {
            font-size: 1.5rem;
            opacity: 0.9;
        }

        .detail-label {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .hourly-forecast {
            margin-bottom: 30px;
        }

        .hourly-forecast h2,
        .daily-forecast h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hourly-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .hourly-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .hourly-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .hourly-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .hourly-item {
            min-width: 80px;
            text-align: center;
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: var(--transition);
            cursor: pointer;
        }

        .hourly-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .hourly-item .time {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .hourly-item i {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .hourly-item .temp {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .daily-list {
            padding: 20px;
        }

        .daily-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: var(--transition);
            cursor: pointer;
        }

        .daily-item:last-child {
            margin-bottom: 0;
        }

        .daily-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .daily-day {
            font-weight: 600;
            min-width: 100px;
        }

        .daily-icon {
            font-size: 1.5rem;
            min-width: 40px;
            text-align: center;
        }

        .daily-condition {
            flex: 1;
            text-align: center;
            opacity: 0.9;
        }

        .daily-temps {
            display: flex;
            gap: 15px;
            min-width: 120px;
            justify-content: flex-end;
        }

        .daily-high {
            font-weight: 700;
        }

        .daily-low {
            opacity: 0.7;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .footer i {
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }

            .temperature {
                font-size: 3.5rem;
            }

            .weather-main {
                gap: 20px;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .daily-item {
                flex-wrap: wrap;
                gap: 10px;
            }

            .daily-condition {
                width: 100%;
                text-align: left;
                order: 3;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 15px;
            }

            .weather-card {
                padding: 20px;
            }

            .temperature {
                font-size: 3rem;
            }

            .location-info h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="weather-app" id="weatherApp">
        <div class="loading-screen" id="loadingScreen">
            <div class="loader">
                <div class="cloud"></div>
                <div class="sun"></div>
            </div>
            <p>വെതർ ലോഡ് ചെയ്യുന്നു...</p>
        </div>

        <div class="main-content" id="mainContent" style="display: none;">
            <header class="header">
                <div class="logo">
                    <i class="fas fa-cloud-sun"></i>
                    <span>മഴമേഘം</span>
                </div>
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="നഗരം തിരയുക..." autocomplete="off">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                    <button id="locationBtn" title="എന്റെ ലൊക്കേഷൻ"><i class="fas fa-location-arrow"></i></button>
                </div>
            </header>

            <section class="current-weather">
                <div class="weather-card glass">
                    <div class="location-info">
                        <h1 id="cityName">--</h1>
                        <p id="currentDate">--</p>
                    </div>
                    <div class="weather-main">
                        <div class="temp-section">
                            <div class="temperature" id="temperature">--°</div>
                            <div class="feels-like" id="feelsLike">അനുഭവപ്പെടുന്നത് --°</div>
                        </div>
                        <div class="weather-icon-section">
                            <i id="weatherIcon" class="fas fa-sun"></i>
                            <div class="condition" id="condition">--</div>
                        </div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <i class="fas fa-wind"></i>
                            <span class="detail-label">കാറ്റ്</span>
                            <span class="detail-value" id="windSpeed">-- km/h</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-tint"></i>
                            <span class="detail-label">ഈർപ്പം</span>
                            <span class="detail-value" id="humidity">--%</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-eye"></i>
                            <span class="detail-label">മേഘം</span>
                            <span class="detail-value" id="visibility">--%</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-gauge-high"></i>
                            <span class="detail-label">മർദ്ദം</span>
                            <span class="detail-value" id="pressure">-- hPa</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="hourly-forecast">
                <h2><i class="fas fa-clock"></i> മണിക്കൂർ പ്രവചനം</h2>
                <div class="hourly-scroll glass" id="hourlyContainer"></div>
            </section>

            <section class="daily-forecast">
                <h2><i class="fas fa-calendar-alt"></i> 7 ദിവസ പ്രവചനം</h2>
                <div class="daily-list glass" id="dailyContainer"></div>
            </section>

            <footer class="footer">
                <p>Powered by Open-Meteo API | <i class="fas fa-heart"></i> മഴമേഘം</p>
            </footer>
        </div>
    </div>

    <script>
        const app = {
            apiBase: 'https://api.open-meteo.com/v1',
            geoBase: 'https://geocoding-api.open-meteo.com/v1',
            currentLat: 10.8505,
            currentLon: 76.2711,
            currentCity: 'കേരളം',

            weatherCodes: {
                0: { text: 'വെളിച്ചം', icon: 'fa-sun', bg: 'sunny' },
                1: { text: 'പകുതി മേഘം', icon: 'fa-cloud-sun', bg: 'cloudy' },
                2: { text: 'മേഘം', icon: 'fa-cloud', bg: 'cloudy' },
                3: { text: 'ഇരുട്ട്', icon: 'fa-cloud', bg: 'cloudy' },
                45: { text: 'മൂടൽമഞ്ഞ്', icon: 'fa-smog', bg: 'cloudy' },
                48: { text: 'മഞ്ഞ്', icon: 'fa-smog', bg: 'cloudy' },
                51: { text: 'ചാറ്റൽ മഴ', icon: 'fa-cloud-rain', bg: 'rainy' },
                53: { text: 'ചാറ്റൽ മഴ', icon: 'fa-cloud-rain', bg: 'rainy' },
                55: { text: 'ചാറ്റൽ മഴ', icon: 'fa-cloud-rain', bg: 'rainy' },
                61: { text: 'ചെറിയ മഴ', icon: 'fa-cloud-rain', bg: 'rainy' },
                63: { text: 'മഴ', icon: 'fa-cloud-showers-heavy', bg: 'rainy' },
                65: { text: 'കനത്ത മഴ', icon: 'fa-cloud-showers-heavy', bg: 'rainy' },
                71: { text: 'ചെറിയ മഞ്ഞ്', icon: 'fa-snowflake', bg: 'snowy' },
                73: { text: 'മഞ്ഞ്', icon: 'fa-snowflake', bg: 'snowy' },
                75: { text: 'കനത്ത മഞ്ഞ്', icon: 'fa-snowflake', bg: 'snowy' },
                77: { text: 'മഞ്ഞ്', icon: 'fa-snowflake', bg: 'snowy' },
                80: { text: 'മഴ', icon: 'fa-cloud-rain', bg: 'rainy' },
                81: { text: 'മഴ', icon: 'fa-cloud-showers-heavy', bg: 'rainy' },
                82: { text: 'കനത്ത മഴ', icon: 'fa-cloud-showers-heavy', bg: 'rainy' },
                85: { text: 'മഞ്ഞ്', icon: 'fa-snowflake', bg: 'snowy' },
                86: { text: 'കനത്ത മഞ്ഞ്', icon: 'fa-snowflake', bg: 'snowy' },
                95: { text: 'ഇടിമിന്നൽ', icon: 'fa-bolt', bg: 'stormy' },
                96: { text: 'ഇടിമിന്നൽ', icon: 'fa-bolt', bg: 'stormy' },
                99: { text: 'ഇടിമിന്നൽ', icon: 'fa-bolt', bg: 'stormy' }
            },

            days: ['ഞായർ', 'തിങ്കൾ', 'ചൊവ്വ', 'ബുധൻ', 'വ്യാഴം', 'വെള്ളി', 'ശനി'],

            init() {
                this.bindEvents();
                this.loadWeather();
            },

            bindEvents() {
                document.getElementById('searchBtn').addEventListener('click', () => this.searchCity());
                document.getElementById('cityInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.searchCity();
                });
                document.getElementById('locationBtn').addEventListener('click', () => this.getLocation());
            },

            async searchCity() {
                const input = document.getElementById('cityInput');
                const query = input.value.trim();
                if (!query) return;

                try {
                    this.showLoading();
                    const response = await fetch(`${this.geoBase}/search?name=${encodeURIComponent(query)}&count=1&language=ml&format=json`);
                    const data = await response.json();

                    if (data.results && data.results.length > 0) {
                        const result = data.results[0];
                        this.currentLat = result.latitude;
                        this.currentLon = result.longitude;
                        this.currentCity = result.name;
                        await this.fetchWeather();
                        input.value = '';
                    } else {
                        alert('നഗരം കണ്ടെത്താനായില്ല. വീണ്ടും ശ്രമിക്കുക.');
                    }
                } catch (error) {
                    console.error('Search error:', error);
                    alert('പിശക് സംഭവിച്ചു. വീണ്ടും ശ്രമിക്കുക.');
                } finally {
                    this.hideLoading();
                }
            },

            getLocation() {
                if (navigator.geolocation) {
                    this.showLoading();
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            this.currentLat = position.coords.latitude;
                            this.currentLon = position.coords.longitude;

                            try {
                                const response = await fetch(`${this.geoBase}/reverse?latitude=${this.currentLat}&longitude=${this.currentLon}&language=ml`);
                                const data = await response.json();
                                this.currentCity = data.results?.[0]?.name || 'എന്റെ ലൊക്കേഷൻ';
                            } catch {
                                this.currentCity = 'എന്റെ ലൊക്കേഷൻ';
                            }

                            await this.fetchWeather();
                            this.hideLoading();
                        },
                        (error) => {
                            this.hideLoading();
                            alert('ലൊക്കേഷൻ ലഭ്യമല്ല. ദയവായി നഗരം സെർച്ച് ചെയ്യുക.');
                        }
                    );
                } else {
                    alert('ലൊക്കേഷൻ സപ്പോർട്ട് ഇല്ല.');
                }
            },

            async loadWeather() {
                this.showLoading();
                await this.fetchWeather();
                this.hideLoading();
            },

            async fetchWeather() {
                try {
                    const url = `${this.apiBase}/forecast?latitude=${this.currentLat}&longitude=${this.currentLon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,rain,weather_code,cloud_cover,pressure_msl,surface_pressure,wind_speed_10m&hourly=temperature_2m,weather_code,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&forecast_days=8`;

                    const response = await fetch(url);
                    const data = await response.json();

                    this.updateUI(data);
                } catch (error) {
                    console.error('Weather fetch error:', error);
                    alert('വെതർ ഡാറ്റ ലഭ്യമല്ല. ഇന്റർനെറ്റ് പരിശോധിക്കുക.');
                }
            },

            updateUI(data) {
                const current = data.current;
                const daily = data.daily;
                const hourly = data.hourly;

                const weatherInfo = this.weatherCodes[current.weather_code] || this.weatherCodes[0];
                document.getElementById('weatherApp').className = `weather-app ${weatherInfo.bg}`;

                document.getElementById('cityName').textContent = this.currentCity;
                document.getElementById('currentDate').textContent = this.formatDate(new Date());
                document.getElementById('temperature').textContent = `${Math.round(current.temperature_2m)}°`;
                document.getElementById('feelsLike').textContent = `അനുഭവപ്പെടുന്നത് ${Math.round(current.apparent_temperature)}°`;
                document.getElementById('condition').textContent = weatherInfo.text;

                const iconEl = document.getElementById('weatherIcon');
                iconEl.className = `fas ${weatherInfo.icon}`;

                document.getElementById('windSpeed').textContent = `${current.wind_speed_10m} km/h`;
                document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
                document.getElementById('visibility').textContent = `${Math.round(current.cloud_cover)}%`;
                document.getElementById('pressure').textContent = `${Math.round(current.pressure_msl)} hPa`;

                this.renderHourly(hourly);
                this.renderDaily(daily);
            },

            renderHourly(hourly) {
                const container = document.getElementById('hourlyContainer');
                container.innerHTML = '';

                const now = new Date();
                const currentHour = now.getHours();

                for (let i = 0; i < 24; i++) {
                    const index = currentHour + i;
                    if (index >= hourly.time.length) break;

                    const time = new Date(hourly.time[index]);
                    const temp = Math.round(hourly.temperature_2m[index]);
                    const code = hourly.weather_code[index];
                    const isDay = hourly.is_day[index];
                    const info = this.weatherCodes[code] || this.weatherCodes[0];

                    let icon = info.icon;
                    if (!isDay && icon === 'fa-sun') icon = 'fa-moon';

                    const div = document.createElement('div');
                    div.className = 'hourly-item';
                    div.innerHTML = `
                        <div class="time">${i === 0 ? 'ഇപ്പോൾ' : time.getHours().toString().padStart(2, '0') + ':00'}</div>
                        <i class="fas ${icon}"></i>
                        <div class="temp">${temp}°</div>
                    `;
                    container.appendChild(div);
                }
            },

            renderDaily(daily) {
                const container = document.getElementById('dailyContainer');
                container.innerHTML = '';

                for (let i = 1; i < daily.time.length; i++) {
                    const date = new Date(daily.time[i]);
                    const dayName = this.days[date.getDay()];
                    const max = Math.round(daily.temperature_2m_max[i]);
                    const min = Math.round(daily.temperature_2m_min[i]);
                    const code = daily.weather_code[i];
                    const info = this.weatherCodes[code] || this.weatherCodes[0];

                    const div = document.createElement('div');
                    div.className = 'daily-item';
                    div.innerHTML = `
                        <div class="daily-day">${dayName}</div>
                        <div class="daily-icon"><i class="fas ${info.icon}"></i></div>
                        <div class="daily-condition">${info.text}</div>
                        <div class="daily-temps">
                            <span class="daily-high">${max}°</span>
                            <span class="daily-low">${min}°</span>
                        </div>
                    `;
                    container.appendChild(div);
                }
            },

            formatDate(date) {
                const options = { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                };
                return date.toLocaleDateString('ml-IN', options);
            },

            showLoading() {
                document.getElementById('loadingScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            },

            hideLoading() {
                document.getElementById('loadingScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingScreen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    document.getElementById('loadingScreen').style.opacity = '1';
                }, 500);
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
  </html>
